<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>HR System (Enterprise)</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root{
      --bg0:#f4f7fb;
      --bg1:#eef3fb;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#e6edf7;
      --nav:#0b1220;
      --nav2:#0f172a;
      --accent:#2563eb;
      --accent2:#22c55e;
      --shadow: 0 10px 30px rgba(15,23,42,.08);
      --shadow2: 0 6px 18px rgba(2,6,23,.08);
      --r12:12px;
      --r16:16px;
      --r20:20px;
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      color:var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 600px at 20% 0%, #eaf2ff 0%, transparent 55%),
                  radial-gradient(1200px 600px at 90% 10%, #edf7ff 0%, transparent 55%),
                  linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height:100vh;
    }

    header{
      position:sticky; top:0; z-index:50;
      background: linear-gradient(180deg, var(--nav), var(--nav2));
      color:#fff;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }
    header .brand{
      font-weight:800;
      letter-spacing:.2px;
      display:flex; gap:10px; align-items:center;
    }
    .badge{
      display:inline-flex; align-items:center; gap:6px;
      padding:4px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      font-size:12px;
      color:#e5e7eb;
      border:1px solid rgba(255,255,255,.12);
    }
    .dot{width:8px;height:8px;border-radius:999px;background:var(--accent2);display:inline-block;}

    .wrap{
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px;
    }

    /* top nav tabs */
    .topTabs{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center;
      margin: 8px 0 14px;
    }
    .tab{
      cursor:pointer;
      user-select:none;
      padding:10px 14px;
      border-radius:999px;
      background: rgba(15,23,42,.06);
      border:1px solid rgba(15,23,42,.08);
      font-weight:800;
      font-size:13px;
      color: var(--ink);
      transition:.15s;
    }
    .tab:hover{ transform: translateY(-1px); box-shadow: var(--shadow2); }
    .tab.active{
      background: linear-gradient(180deg, #111827, #0b1220);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
    }

    /* filters bar */
    .filterBar{
      background: rgba(255,255,255,.72);
      border:1px solid rgba(15,23,42,.08);
      box-shadow: var(--shadow2);
      border-radius: 18px;
      padding: 12px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      backdrop-filter: blur(10px);
    }
    .filterBar input, .filterBar select{
      border:1px solid rgba(15,23,42,.10);
      background:#fff;
      border-radius:999px;
      padding:10px 12px;
      font-weight:700;
      font-size:13px;
      outline:none;
      min-width: 180px;
    }
    .filterBar .meta{
      margin-left:auto;
      color: var(--muted);
      font-size:12px;
      font-weight:700;
    }

    /* cards */
    .card{
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(15,23,42,.08);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 14px;
      backdrop-filter: blur(12px);
    }
    .card h2{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }
    .sub{
      color: var(--muted);
      font-size:13px;
      font-weight:700;
      margin-top:6px;
    }

    /* kpi rows */
    .kpiRow{
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:12px;
      margin-top: 14px;
    }
    @media (max-width:1100px){
      .kpiRow{ grid-template-columns: repeat(2,1fr); }
    }
    .kpi{
      background: #fff;
      border: 1px solid rgba(15,23,42,.08);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(2,6,23,.06);
      cursor:pointer;
      transition:.15s;
      position:relative;
      overflow:hidden;
      min-height: 92px;
    }
    .kpi:hover{ transform: translateY(-2px); box-shadow: 0 12px 26px rgba(2,6,23,.09); }
    .kpi .t{ font-size:12px; color:var(--muted); font-weight:900; }
    .kpi .v{ font-size:28px; font-weight:1000; margin-top:6px; }
    .kpi .hint{ font-size:12px; color:#64748b; font-weight:800; margin-top:8px; }
    .kpi .spark{
      position:absolute; right:-30px; top:-30px;
      width:120px; height:120px;
      border-radius:999px;
      background: radial-gradient(circle at 40% 40%, rgba(37,99,235,.25), transparent 55%);
      filter: blur(0px);
    }

    /* role tiles */
    .tileGrid{
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      gap:10px;
      margin-top: 12px;
    }
    @media (max-width:1200px){ .tileGrid{ grid-template-columns: repeat(3,1fr);} }
    @media (max-width:700px){ .tileGrid{ grid-template-columns: repeat(2,1fr);} }

    .tile{
      background:#fff;
      border: 1px solid rgba(15,23,42,.08);
      border-radius: 18px;
      padding: 12px 12px;
      box-shadow: 0 8px 18px rgba(2,6,23,.05);
      cursor:pointer;
      transition:.14s;
      min-height: 70px;
    }
    .tile:hover{ transform: translateY(-2px); box-shadow: 0 12px 24px rgba(2,6,23,.09); }
    .tile .name{ font-weight:950; font-size:13px; }
    .tile .count{ color:var(--muted); font-weight:900; margin-top:6px; }

    /* two charts row */
    .grid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      margin-top:14px;
    }
    @media(max-width:1100px){ .grid2{ grid-template-columns: 1fr; } }

    .chartBox{ height: 360px; }
    .chartBox canvas{ width:100% !important; height:100% !important; }

    /* team table */
    .tableWrap{
      width:100%;
      overflow:auto;
      border-radius: 16px;
      border:1px solid rgba(15,23,42,.08);
      background:#fff;
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
    }
    thead th{

      background: linear-gradient(180deg, #0b1220, #111827);
      color:#fff;
      padding:10px 10px;
      font-weight:950;
      letter-spacing:.2px;
      white-space:nowrap;
    }
    tbody td{
      padding:9px 10px;
      border-bottom:1px solid #edf2f7;
      vertical-align:top;
    }
    tbody tr:hover{ background: #f7fbff; }
    .link{
      color: var(--accent);
      font-weight:950;
      cursor:pointer;
    }

    /* compact table for less horizontal scroll */
    .compact table{ font-size:11px; }
    .compact tbody td{ padding:8px 8px; }

    /* cards view (no horizontal scroll) */
    .cardsView{
      display:grid;
      grid-template-columns: repeat(3,1fr);
      gap:10px;
    }
    @media(max-width:1100px){ .cardsView{ grid-template-columns: repeat(2,1fr); } }
    @media(max-width:700px){ .cardsView{ grid-template-columns: 1fr; } }

    .empCard{

      border:1px solid rgba(15,23,42,.08);
      border-radius:18px;
      box-shadow: 0 10px 24px rgba(2,6,23,.06);
      padding:12px;
    }
    .empCard .row1{
      display:flex; justify-content:space-between; gap:10px;
      align-items:flex-start;
    }
    .empCard .nm{
      font-weight:1000;
      font-size:14px;
      line-height:1.2;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:4px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
      border:1px solid rgba(15,23,42,.10);
      background:#f8fafc;
      color:#0f172a;
      white-space:nowrap;
    }
    .empCard .meta{
      margin-top:8px;

      font-weight:800;
      font-size:12px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:6px 10px;
    }
    .empCard .meta div{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .btnRow{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-top: 10px;
    }
    .btn{
      cursor:pointer;
      user-select:none;
      padding:9px 12px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(15,23,42,.12);
      font-weight:900;
      font-size:12px;
    }
    .btn.primary{
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    /* modal */
    .modal{
      position:fixed; inset:0;
      background: rgba(2,6,23,.55);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:200;
      padding: 18px;
    }
    .modal .box{
      width: min(1400px, 98vw);
      max-height: 92vh;

      background: rgba(255,255,255,.95);
      border: 1px solid rgba(255,255,255,.18);

      padding: 16px;
      backdrop-filter: blur(14px);

    .modal .head{
      display:flex; align-items:center; justify-content:space-between;
      gap:12px;
      position:sticky; top:0;
      background: rgba(255,255,255,.92);

      border-bottom: 1px solid rgba(15,23,42,.08);
      z-index:2;

      margin:0;
      font-size:16px;
      font-weight:1000;
    }
    .x{
      cursor:pointer;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(15,23,42,.12);
      background:#fff;

    }

    /* sections visibility */
    .page{ display:none; }
    .page.active{ display:block; }

    /* small helper text */
    .note{
      margin-top:8px;
      color: var(--muted);
      font-weight:800;
      font-size:12px;
    }
    .statsFilters{
    display:flex;
    gap:10px;
    margin:15px 0;
    }

    .statsFilters select{
    padding:6px 10px;
    border-radius:6px;
    border:1px solid #ccc;
    }
    .statsFilters input[type="date"]{
      padding:6px 10px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    /* ===== FORCE CENTER ALL TEXT ===== */
    body,
    .card,
    .kpi,
    .tile,
    .empCard,
    .modal .box,
    .note,
    .sub,
    .badge,
    .pill,
    .btn,
    table,
    thead th,
    tbody td {
      text-align: center !important;
    }

    /* Center flex containers */
    header,
    .filterBar,
    .topTabs,
    .kpiRow,
    .grid2,
    .btnRow,
    .empCard .row1 {
      justify-content: center !important;
    }

    /* ===== GIỮ HEADER & FILTER NHƯ CŨ ===== */
    header{
      justify-content: space-between !important;
      text-align: left !important;
    }

    .filterBar{
      justify-content: flex-start !important;
      text-align: left !important;
    }

    .filterBar select{
      text-align: left !important;
    }

    .filterBar .meta{
      margin-left: auto !important;
      text-align: right !important;
    }

    /* =========================
       STICKY HEADER - 2 ROWS ĐỒNG NHẤT NỀN

</head>

<script>
/* =========================================================
   CONFIG
   ========================================================= */
const SHEET_API = "https://opensheet.elk.sh/1e38ZBHG0B0nxODaooPhgreG67A2RLxLxrpP8Sas_vZA/填表";

// ===== ORDER STATISTICS API =====

const ORDER_API =
"https://opensheet.vercel.app/1TEp-YzwjFKjorR4Xpmrb6UiKq2maMmawIW6oYQI75qM/填表";

const ACCOUNT_API =
"https://opensheet.elk.sh/1e38ZBHG0B0nxODaooPhgreG67A2RLxLxrpP8Sas_vZA/账号";

const MISTAKE_API = "https://opensheet.vercel.app/1TEp-YzwjFKjorR4Xpmrb6UiKq2maMmawIW6oYQI75qM/员工错误";
let MISTAKES = [];

/*
  Column mapping (by header names from your sheet):
  负责人        现场培训        线上组长        线上培训        组别        团队        姓名        ID        班次        国家        岗位        盘口        工作内容
*/

let RAW = [];
let FILTERED = [];

let ACCOUNT_MAP = {};
let ACCOUNT_JOIN_DATE = {};
let ORDER_STATS = {};

let charts = { pos:null, team:null, shift:null };

const els = {
  pageDashboard: document.getElementById("page-dashboard"),
  pageEmployees: document.getElementById("page-employees"),
  pageSchedule: document.getElementById("page-schedule"),
  pagePan: document.getElementById("page-pan"),
  pageStats: document.getElementById("page-stats"),
  pageMistakes: document.getElementById("page-mistakes"),

  tabs: document.querySelectorAll(".tab"),

  q: document.getElementById("q"),
  shiftSel: document.getElementById("shiftSel"),
  teamSel: document.getElementById("teamSel"),
  groupSel: document.getElementById("groupSel"),
  posSel: document.getElementById("posSel"),
  countrySel: document.getElementById("countrySel"),
  panSel: document.getElementById("panSel"),
  meta: document.getElementById("meta"),

  modal: document.getElementById("modal"),
  modalTitle: document.getElementById("modalTitle"),
  modalBody: document.getElementById("modalBody"),
  modalClose: document.getElementById("modalClose"),
  modalBack: document.getElementById("modalBack")
};

function s(v){ return (v ?? "").toString().trim(); }
function norm(v){ return s(v).replace(/\s+/g," ").trim(); }
function uniq(arr){ return [...new Set(arr.filter(Boolean))]; }
function normDateISO(v){
  const str = (v ?? "").toString().trim();
  if(!str) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;

  let m = str.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
  if(m){
    const y=m[1], mm=String(+m[2]).padStart(2,"0"), dd=String(+m[3]).padStart(2,"0");
    return `${y}-${mm}-${dd}`;
  }

  m = str.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})$/);
  if(m){
    let a=+m[1], b=+m[2], y=m[3];
    let day, month;
    if(a>12){ day=a; month=b; }
    else if(b>12){ month=a; day=b; }
    else { day=a; month=b; } // mặc định D/M/YYYY
    return `${y}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  }
  return str;
}

function esc(str){
  return (str??"").toString()
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
  function showFullContent(title, content){
  openModal(title, `<div style="padding:20px; font-size:16px; word-break: break-all;">${esc(content)}</div>`);
}
  

/* =========================================================
   ✅ header-safe pick (chống opensheet header lệch)
   ========================================================= */
function pick(r, keys){
  for(const k of keys){
    if(Object.prototype.hasOwnProperty.call(r, k)){
      const v = (r[k] ?? "").toString();
      if(v.trim() !== "") return v;
    }
  }
  const objKeys = Object.keys(r || {});
  for(const want of keys){
    const w = (want ?? "").toString().trim();
    const found = objKeys.find(ok => ok.toString().trim() === w);
    if(found){
      const v = (r[found] ?? "").toString();
      if(v.trim() !== "") return v;
    }
  }
  return "";
}
function normPick(r, keys){ return norm(pick(r, keys)); }

function isValidName(name){
  const v = norm(name);
  if(!v) return false;
  const low = v.toLowerCase();
  if(low === "null" || low === "undefined") return false;
  if(v.replace(/\s/g,"") === "") return false;
  return true;
}

/* =========================================================
   NAV
   ========================================================= */
els.tabs.forEach(t=>{
  t.addEventListener("click", ()=>{
    els.tabs.forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    const p = t.dataset.page;
    document.querySelectorAll(".page").forEach(pg=>pg.classList.remove("active"));
    document.getElementById("page-"+p).classList.add("active");
  });
});

/* =========================================================
   MODAL + STACK NAV INSIDE MODAL
   ========================================================= */
let modalStack = [];

function openModal(title, html){
  els.modalTitle.textContent = title;
  els.modalBody.innerHTML = html;
  els.modal.style.display="flex";
  els.modalBack.style.display = modalStack.length ? "inline-flex" : "none";
}
function pushModal(title, html){
  modalStack.push({ title: els.modalTitle.textContent, html: els.modalBody.innerHTML });
  els.modalBack.style.display = "inline-flex";
  openModal(title, html);
}
function closeModal(){
  els.modal.style.display="none";
  els.modalBody.innerHTML="";
  els.modalTitle.textContent="";
  modalStack = [];
  els.modalBack.style.display = "none";
}
els.modalClose.onclick = closeModal;
els.modal.onclick = (e)=>{ if(e.target === els.modal) closeModal(); };
els.modalBack.onclick = ()=>{
  const prev = modalStack.pop();
  if(!prev){ els.modalBack.style.display="none"; return; }
  openModal(prev.title, prev.html);
  els.modalBack.style.display = modalStack.length ? "inline-flex" : "none";
};

/* =========================================================
   FILTERS
   ========================================================= */
function buildSelectOptions(selectEl, items, labelAll){
  const opts = [`<option value="">${esc(labelAll)}</option>`]
    .concat(items.map(x=>`<option value="${esc(x)}">${esc(x)}</option>`));
  selectEl.innerHTML = opts.join("");
}

function applyFilters(){
  const q = norm(els.q.value).toLowerCase();
  const shift = els.shiftSel.value;
  const team  = els.teamSel.value;
  const group = els.groupSel.value;
  const pos   = els.posSel.value;
  const country = els.countrySel.value;
  const pan   = els.panSel.value;

  FILTERED = RAW.filter(r=>{
    const 姓名 = norm(r["姓名"]);
    const ID = norm(r["ID"]);
    const 团队 = norm(r["团队"]);
    const 组别 = norm(r["组别"]);
    const 岗位 = norm(r["岗位"]);
    const 班次 = norm(r["班次"]);
    const 盘口 = norm(r["盘口"]);
    const 国家 = norm(r["国家"]);
    const 工作内容 = norm(r["工作内容"]);

    if(shift && 班次 !== shift) return false;
    if(team && 团队 !== team) return false;
    if(group && 组别 !== group) return false;
    if(pos && 岗位 !== pos) return false;
    if(country && 国家 !== country) return false;
    if(pan && 盘口 !== pan) return false;

    if(q){
      const hay = [
        姓名, ID, 团队, 组别, 岗位, 班次, 盘口, 国家, 工作内容
      ].join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  els.meta.textContent =
    `Rows: ${RAW.length} • Filtered: ${FILTERED.length} • ${new Date().toLocaleString()}`;

  renderDashboard();
  renderEmployees();
  renderSchedule();
  renderPanPage();
  renderStatsPage();
}

/* =========================================================
   STATS HELPERS
   ========================================================= */
function getTotalPeopleSet(rows){
  const set = new Set();
  rows.forEach(r=>{
    const name = norm(r["姓名"]);
    if(isValidName(name)){
      set.add(name);
    }
  });
  return set;
}

function getUniqueSetByField(rows, field){
  const set = new Set();
  rows.forEach(r=>{
    const v = norm(r[field]);
    if(v) set.add(v);
  });
  return set;
}

function groupBy(rows, field, emptyLabel="未填写"){
  const m = new Map();
  rows.forEach(r=>{
    const k = norm(r[field]) || emptyLabel;
    if(!m.has(k)) m.set(k, []);
    m.get(k).push(r);
  });
  return m;
}

function countByUniqueName(rows){
  const set = new Set();
  rows.forEach(r=>{
    const name = norm(r["姓名"]);
    if(isValidName(name)) set.add(name);
  });
  return set.size;
}

}

function openManagerList(fieldLabel, rows){
  const set = getUniqueSetByField(rows, fieldLabel);
  const names = [...set].sort((a,b)=>a.localeCompare(b,"zh"));
  const html = `
    <div class="note">点击名字 → 查看该 ${esc(fieldLabel)} 管理的员工（从表里匹配同名字段）。</div>
    <div class="tileGrid">
      ${names.map(n=>{
        const subs = rows.filter(r=>norm(r[fieldLabel])===n);
        const c = countByUniqueName(subs);
        return `
          <div class="tile" onclick="openManagerSubs('${esc(fieldLabel)}','${esc(n)}')">
            <div class="name">${esc(n)}</div>
            <div class="count">下属: ${c}</div>
          </div>
        `;
      }).join("")}
    </div>
  `;
  openModal(`${fieldLabel} 名单（${names.length}）`, html);
}

window.openManagerSubs = function(fieldLabel, managerName){
  const subs = FILTERED.filter(r=>norm(r[fieldLabel])===managerName);

    .sort((a,b)=>b.c-a.c);

              <td>${r.c}</td>
            </tr>
          `).join("")}

function buildPosChart(labels, values){
  const ctx = document.getElementById("chartPos");
  if(!ctx) return;
  if(charts.pos) charts.pos.destroy();

  charts.pos = new Chart(ctx, {
    type:"doughnut",
    data:{ labels, datasets:[{ data: values }]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{ position:"top", labels:{ boxWidth:18, font:{ size:11, weight:"700" } } }
      },
      onClick: (evt, elements)=>{
        if(!elements?.length) return;
        const idx = elements[0].index;
        openPos(labels[idx]);
      }
    }
  });
}

function buildTeamChart(labels, values){
  const ctx = document.getElementById("chartTeam");
  if(!ctx) return;
  if(charts.team) charts.team.destroy();

  charts.team = new Chart(ctx, {
    type:"bar",
    data:{ labels, datasets:[{ label:"人数（按姓名去重）", data: values }] },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        x:{ ticks:{ font:{ size:10, weight:"700" }, maxRotation:60, minRotation:60 } },
        y:{ ticks:{ font:{ size:10, weight:"700" } } }
      },
      plugins:{ legend:{ display:false } },
      onClick: (evt, elements)=>{
        if(!elements?.length) return;
        const idx = elements[0].index;
        openTeam(labels[idx]);
      }
    }
  });
}

function buildShiftChart(labels, values){
  const ctx = document.getElementById("chartShift");
  if(!ctx) return;
  if(charts.shift) charts.shift.destroy();

  charts.shift = new Chart(ctx, {
    type:"bar",
    data:{ labels, datasets:[{ label:"人数（按姓名去重）", data: values }] },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ font:{ size:10, weight:"700" }, maxRotation:45, minRotation:45 } },
        y:{ ticks:{ font:{ size:10, weight:"700" } } }
      },
      onClick: (evt, elements)=>{
        if(!elements?.length) return;
        const idx = elements[0].index;
        openShift(labels[idx]);
      }
    }
  });
}

function renderPanPage(){
  const rows = FILTERED;

  const panMap = new Map();
  const totalSet = new Set();

  rows.forEach(r=>{
    const pan = norm(r["盘口"]) || "未填写";
    const shift = norm(r["班次"]);
    const pos = norm(r["岗位"]);
    const name = norm(r["姓名"]);

    if(!isValidName(name)) return;

    totalSet.add(name);

    if(!panMap.has(pan)){
      panMap.set(pan,{
        names: new Set(),
        day: new Set(),
        night: new Set(),
        mid: new Set(),
        posMap: new Map()
      });
    }

    const obj = panMap.get(pan);
    obj.names.add(name);

    if(shift.includes("Day")) obj.day.add(name);
    if(shift.includes("Night")) obj.night.add(name);
    if(shift.includes("中")) obj.mid.add(name);

    if(!obj.posMap.has(pos)) obj.posMap.set(pos,new Set());
    obj.posMap.get(pos).add(name);
  });

  const grandTotal = totalSet.size;

  const list = [...panMap.entries()]
    .map(([pan,data])=>{
      return {
        pan,
        total: data.names.size,
        day: data.day.size,
        night: data.night.size,
        mid: data.mid.size,
        percent: grandTotal ? ((data.names.size/grandTotal)*100).toFixed(2) : 0,
        posDetail: [...data.posMap.entries()]
          .map(([k,v])=>({pos:k,count:v.size}))
          .sort((a,b)=>b.count-a.count)
      };
    })
    .sort((a,b)=>b.total-a.total);

  els.pagePan.innerHTML = `
    <div class="card">
      <h2>盘口人数统计</h2>
      <div class="sub">总人数：${grandTotal}（按姓名去重）</div>
    </div>

    <div class="card">
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>盘口</th>
              <th>总人数</th>
              <th>占比</th>
              <th>白班</th>
              <th>夜班</th>
              <th>中班</th>
              <th>岗位分布</th>
            </tr>
          </thead>
          <tbody>
            ${list.map((r,i)=>`
              <tr style="${i<3?'background:#f0f7ff;font-weight:700':''}">
                <td>#${i+1}</td>
                <td class="link" onclick="openPan('${esc(r.pan)}')">${esc(r.pan)}</td>
                <td>${r.total}</td>
                <td>${r.percent}%</td>
                <td>${r.day}</td>
                <td>${r.night}</td>
                <td>${r.mid}</td>
                <td>
                  ${r.posDetail.map(p=>`${esc(p.pos)}: ${p.count}`).join("<br>")}
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function loadAccountMap(){

  const res = await fetch(ACCOUNT_API);
  const data = await res.json();

  data.forEach(r=>{

    const id = (r["ID"] || "").trim();

    const accounts = (r["后台账号"] || "")
      .split("/")
      .map(a=>a.trim())
      .filter(Boolean);
    const joinDate = (r["入职时间"] || "").trim();

    ACCOUNT_JOIN_DATE[id] = joinDate;

    accounts.forEach(acc=>{
      ACCOUNT_MAP[acc] = id;
    });

  });

}

async function loadOrderStats(){
  const res = await fetch(ORDER_API);
  const data = await res.json();

  const map = {};
  const dates = new Set();

  data.forEach(r=>{
    const acc = (r["后台账号"] || "").trim();
    const id = ACCOUNT_MAP[acc];
    if(!id) return;

    const date = normDateISO(r["日期"]);   // ✅ tạo date trước
    if(!date) return;

    dates.add(date);                       // ✅ add sau khi có date

    if(!map[id]) map[id] = {};
    if(!map[id][date]){
      map[id][date] = { success:0, reject:0 };
    }

    map[id][date].success += Number(r["已处理"] || 0);
    map[id][date].reject  += Number(r["已收回/已提交"] || 0);
  });

  ORDER_STATS = map;
  window.ORDER_DATES = [...dates].sort();
}

                       || RAW.find(r => (r["ID"] || "").trim() === id);

              const name = emp?.["姓名"] || "-";
              const team = emp?.["团队"] || "-";
              const shift = emp?.["班次"] || "-";
              const country = emp?.["国家"] || "-";
              const pos = emp?.["岗位"] || "-";
              const pan = emp?.["盘口"] || "-";
              const join = ACCOUNT_JOIN_DATE[id] || "-";

              let total = 0;
              let validDays = 0;

              activeDates.forEach(d => {
                const day = v?.[d] || {success:0, reject:0};
                const dayTotal = (Number(day.success || 0) + Number(day.reject || 0));
                if(dayTotal > 0){
                  total += dayTotal;
                  validDays += 1;
                }
              });

              const avg = validDays ? Math.round(total / validDays) : 0;

              return `
                <tr>
                  <td>${esc(id)}</td>
                  <td>${esc(name)}</td>
                  <td>${esc(team)}</td>
                  <td>${esc(shift)}</td>
                  <td>${esc(country)}</td>
                  <td>${esc(pos)}</td>
                  <td class="pan-cell" onclick="showFullContent('盘口', '${esc(pan)}')">${esc(pan)}</td>
                  <td>${esc(join)}</td>
                  <td class="sortable" data-value="${total}">${total}</td>
                  <td class="sortable" data-value="${avg}">${avg}</td>

                  ${activeDates.map(d=>{
                    const day = v?.[d] || {success:0,reject:0};
                    return `<td>${day.success || 0} / ${day.reject || 0}</td>`;
                  }).join("")}
                </tr>
              `;
            }).join("")}

          </tbody>
        </table>
      </div>
    </div>
  `;

  // ✅ populate xong rồi mới gắn lại value + onchange
  populateStatsFilters();

  const posSel = document.getElementById("statsPos");
  if(posSel) posSel.onchange = renderStatsPage;

  const fromEl = document.getElementById("statsFrom");
  if(fromEl) fromEl.onchange = renderStatsPage;

  const toEl = document.getElementById("statsTo");
  if(toEl) toEl.onchange = renderStatsPage;
}
// ===== STATS TABLE: SORTABLE + CLICK MODAL =====
document.addEventListener("click", e => {

  // 1️⃣ Nếu click vào header có class "sortable" → sắp xếp
  const th = e.target.closest("th.sortable");
  if(th){
    const table = th.closest("table");
    const tbody = table.querySelector("tbody");
    const index = Array.from(th.parentNode.children).indexOf(th);

    th.asc = !th.asc; // toggle ascending/descending

    const rows = Array.from(tbody.querySelectorAll("tr"));
    rows.sort((a,b)=>{
      const aVal = parseFloat(a.children[index].dataset.value || a.children[index].textContent) || 0;
      const bVal = parseFloat(b.children[index].dataset.value || b.children[index].textContent) || 0;
      return th.asc ? aVal - bVal : bVal - aVal;
    });

    rows.forEach(r => tbody.appendChild(r));
    return; // exit listener, tránh tiếp tục check td
  }

  // 2️⃣ Nếu click vào ô trong statsTable → mở modal
  const td = e.target.closest(".statsTable td");
  if(td){
    const content = td.textContent.trim();
    if(content){
      openModal("Chi tiết ô", `<div style="padding:20px;font-size:16px">${esc(content)}</div>`);
    }
  }

});
  // Bắt tất cả ô td trong statsTable
document.addEventListener("click", e => {
  const td = e.target.closest("td");
  if(!td) return;

  // Nếu nội dung bị truncate (có ...), hoặc td.pan-cell
  const style = window.getComputedStyle(td);
  const isTruncated = td.scrollWidth > td.clientWidth;
  
  if(isTruncated || td.classList.contains("pan-cell")){
    // Hiển thị modal full content
    openModal("Chi tiết ô", `<div style="padding:20px;font-size:16px; word-break: break-word;">${esc(td.textContent)}</div>`);
  }
});

load();
</script>
